[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://portal-backend-production-6594.up.railway.app/api/v1"
  VITE_SOCKET_URL = "https://portal-backend-production-6594.up.railway.app"

# SPA — route all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
